name: PR Build Artifacts

on:
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build plugin jar
        run: mvn -B clean package sonar-packaging:sonar-plugin -Dlanguage=mule

      - name: Prepare artifact files
        run: |
          set -euo pipefail
          mkdir -p pr-artifacts
          cp target/*-mule.jar pr-artifacts/
          cp src/test/resources/rules-*.xml pr-artifacts/
          (cd pr-artifacts && sha256sum * > SHA256SUMS.txt)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mule-plugin-pr-artifacts-${{ github.run_number }}
          if-no-files-found: error
          retention-days: 14
          path: |
            pr-artifacts/*
